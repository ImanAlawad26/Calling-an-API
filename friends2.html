<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>friends2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <h1 class="mb-4 text-center">Friends Table</h1>

    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Full Name</th>
        </tr>
      </thead>
      <tbody id="friendsTableBody"></tbody>
    </table>

    <div id="friendBox" class="card mt-4 p-3" style="display: none;">
      <h3>Friend Information</h3>
      <div id="friendDetails"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://friends-node-01-47e26a48b0b0.herokuapp.com/friends";
    const tableBody = document.getElementById("friendsTableBody");
    const friendBox = document.getElementById("friendBox");
    const friendDetails = document.getElementById("friendDetails");

    async function loadFriends() {
      try {
        const response = await fetch(API_URL);
        const friends = await response.json();

        for (let i = 0; i < friends.length; i++) {
          const friend = friends[i];
          const fullName = friend.firstName + " " + friend.lastName;

          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${friend.id}</td>
            <td>
              <a href="#" onclick="ShowFriend(${friend.id}); return false;">
                ${fullName}
              </a>
            </td>
          `;

          tableBody.appendChild(row);
        }
      } catch (error) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="2">Could not load friends.</td>
          </tr>
        `;
      }
    }

    async function ShowFriend(id) {
      try {
        const response = await fetch(`${API_URL}/${id}`);

        if (!response.ok) {
          throw new Error("Friend not found");
        }

        const friend = await response.json();

        friendDetails.innerHTML = `
          <p><strong>ID:</strong> ${friend.id}</p>
          <p><strong>First Name:</strong> ${friend.firstName}</p>
          <p><strong>Last Name:</strong> ${friend.lastName}</p>
          <p><strong>Phone:</strong> ${friend.phone}</p>
          <p>
            <strong>Link:</strong>
            <a href="https://api.com/friends/${friend.id}" target="_blank">
              https://api.com/friends/${friend.id}
            </a>
          </p>
        `;

        friendBox.style.display = "block";
      } catch (error) {
        friendDetails.innerHTML = `<p>Could not load that friend's information.</p>`;
        friendBox.style.display = "block";
      }
    }

    loadFriends();
  </script>
</body>
</html>
